<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us | Just Seal Bros</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:'Roboto', sans-serif; }
body { background:#fff; display:flex; flex-direction:column; min-height:100vh; color:#111; line-height:1.6; }

header {
  display:flex; justify-content:space-between; align-items:center;
  padding:20px 5%; background:#000; color:#fff; position:sticky; top:0; z-index:100; box-shadow:0 2px 5px rgba(0,0,0,0.2);
}
header .logo { font-family:'Oswald'; font-size:1.5rem; color:#fff; }
header nav { display:flex; gap:25px; }
header nav a { color:#fff; text-decoration:none; font-weight:700; text-transform:uppercase; }
header nav a:hover { color:red; }

.main-content { flex:1; display:flex; align-items:center; justify-content:center; padding:40px 20px; }
.container {
  max-width:700px; width:100%; background:#f9f9f9; padding:40px; border-radius:10px;
  box-shadow:0 4px 15px rgba(0,0,0,0.1); text-align:center;
}
.container h1 { text-align:center; color:red; font-family:'Oswald'; margin-bottom:30px; }

input, textarea { width:100%; padding:12px; margin-bottom:20px; border-radius:5px; border:1px solid #ccc; font-size:1rem; }
button { width:100%; padding:15px; background:red; color:#fff; font-weight:bold; border:none; border-radius:5px; cursor:pointer; font-size:1rem; transition: background 0.3s; }
button:hover { background: #cc0000; }
button:disabled { background: #555; cursor: not-allowed; }

footer { background:#000; color:#fff; text-align:center; padding:20px; margin-top:auto; }

#successMessage { display:none; padding: 20px; }
#successMessage h2 { color: red; font-family: 'Oswald'; margin-bottom: 10px; }

@media (max-width:768px) {
  header { flex-direction:column; gap:15px; }
  header nav { flex-wrap:wrap; justify-content:center; gap:10px; }
  .container { padding:30px 20px; }
}
</style>
</head>
<body>

<header>
  <div class="logo">Just Seal Bros</div>
  <nav>
    <a href="./">Home</a>
    <a href="quote">Quote</a>
    <a href="employment">Jobs</a>
    <a href="contact">Contact</a>
  </nav>
</header>

<div class="main-content">
  <div class="container">
    <div id="formContainer">
      <h1>Contact Us</h1>
      <form id="contactForm">
        <input type="text" id="userName" placeholder="Name" required>
        <input type="email" id="userEmail" placeholder="Email" required>
        <textarea id="userMessage" placeholder="Message" rows="5" required></textarea>
        <button type="submit" id="submitBtn">Send Message</button>
      </form>
    </div>

    <div id="successMessage">
      <div style="font-size: 4rem; margin-bottom: 20px;">✅</div>
      <h2>Message Sent!</h2>
      <p>Thanks for reaching out. We've received your message and will be in touch shortly.</p>
      <br>
      <a href="./" style="color:red; font-weight:bold; text-decoration:none;">← Back to Home</a>
    </div>
  </div>
</div>

<footer>
  <p>© 2026 Just Seal Bros | Palatine, IL</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
<script>(function(){ emailjs.init("QnCpF41NzEoGYcmRU"); })();</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSy...",
  authDomain: "js-sealcoating.firebaseapp.com",
  projectId: "js-sealcoating"
});
const db = getFirestore(app);

document.getElementById('contactForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  btn.innerText = "Sending Message...";
  btn.disabled = true;

  const data = {
    from_name: userName.value,
    from_email: userEmail.value,
    message: userMessage.value
  };

  try {
    await addDoc(collection(db, "contact_messages"), { ...data, createdAt: serverTimestamp() });
    await emailjs.send("service_9s21rio", "template_7erce9d", data);
    formContainer.style.display = 'none';
    successMessage.style.display = 'block';
  } catch {
    alert("Error");
    btn.disabled = false;
  }
});
</script>

</body>
</html>
