<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jobs | JS SealCoating</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:'Roboto', sans-serif; }
body { background:#fff; display: flex; flex-direction: column; min-height: 100vh; }

header {
  display:flex; justify-content:space-between; align-items:center;
  padding:20px 5%; background:#000; color:#fff;
}
header .logo { display:flex; align-items:center; gap:10px; }
header nav { display:flex; gap:25px; }
header nav a { color:#fff; text-decoration:none; font-weight:700; text-transform:uppercase; }

.main-content { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
.container { max-width:700px; width:100%; background:#f9f9f9; padding:40px; border-radius:10px; box-shadow:0 4px 15px rgba(0,0,0,0.1); }
.container h1 { text-align:center; color:red; font-family:'Oswald'; margin-bottom:30px; }

input, textarea { width:100%; padding:12px; margin-bottom:20px; border-radius:5px; border:1px solid #ccc; }
button { width:100%; padding:15px; background:red; color:#fff; font-weight:bold; border:none; border-radius:5px; cursor:pointer; }

footer { background:#000; color:#fff; text-align:center; padding:20px; margin-top: auto; }
</style>
</head>
<body>
<header>
  <div class="logo"><span>JS SealCoating</span></div>
  <nav>
    <a href="index.html">Home</a>
    <a href="quote.html">Quote</a>
    <a href="employment.html">Jobs</a>
    <a href="contact.html">Contact</a>
  </nav>
</header>

<div class="main-content">
  <div class="container">
    <h1>Apply Now</h1>
    <form>
      <input type="text" placeholder="Full Name" required>
      <textarea placeholder="Experience / Resume" rows="5"></textarea>
      <button type="submit">Submit</button>
    </form>
  </div>
</div>

<footer><p>© 2026 JS SealCoating</p></footer>
</body>
</html>
